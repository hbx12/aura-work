stages:
  - mirror

mirror_to_github:
  stage: mirror
  image: alpine:3.20
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_TAG =~ /^v/'
  before_script:
    - apk add --no-cache git
  script:
    - |
      set -euo pipefail
      if [ -z "${GITHUB_MIRROR_TOKEN:-}" ]; then
        echo "GITHUB_MIRROR_TOKEN is required."
        exit 1
      fi

      git config user.name "aura-work mirror"
      git config user.email "mirror@aura-work.local"
      git remote add github "https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/hbx12/aura-work.git"

      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        git push github "refs/tags/${CI_COMMIT_TAG}:refs/tags/${CI_COMMIT_TAG}"
      else
        git push github "HEAD:refs/heads/${CI_COMMIT_BRANCH}"
      fi
