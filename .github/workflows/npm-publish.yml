name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -w aura-work

      - name: Run tests
        run: npm test -w aura-work

      - name: Publish to npm
        run: npm publish -w aura-work --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
