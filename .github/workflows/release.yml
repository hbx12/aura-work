name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npm run build:sidecars
      - run: npm run stage:bundle
      - name: Build Tauri app
        run: npm run tauri build -w @aura-os/desktop
        env:
          CI: true
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**/*
          if-no-files-found: warn

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Generate CycloneDX SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json --omit dev
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: installers-*
          merge-multiple: true
      - name: SHA256 checksums
        run: |
          find release-artifacts -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.sig" -o -name "latest.json" \) -print0 | xargs -0 sha256sum > SHA256SUMS.txt || true
          cat SHA256SUMS.txt || echo "No release files found"
      - name: Install minisign
        run: sudo apt-get update && sudo apt-get install -y minisign
      - name: Sign artifacts (optional)
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
        run: |
          if [ -z "$MINISIGN_KEY" ]; then
            echo "MINISIGN_PRIVATE_KEY not set — skipping artifact signing"
            exit 0
          fi
          echo "$MINISIGN_KEY" > minisign.key
          find release-artifacts -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" \) | while read -r f; do
            minisign -S -s minisign.key -m "$f" -x "$f.minisig"
          done
          rm -f minisign.key
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom.json
            SHA256SUMS.txt
            release-artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
