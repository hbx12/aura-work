name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@v3.88.34
        with:
          extra_args: --only-verified

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Run ESLint
        run: npm run lint

  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: cargo-audit
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo audit
        run: cargo audit -f apps/desktop/src-tauri/Cargo.lock
        working-directory: .

  license-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: node scripts/audit-licenses.mjs
      - name: Verify THIRD-PARTY-NOTICES committed
        run: git diff --exit-code THIRD-PARTY-NOTICES || (echo "Run node scripts/audit-licenses.mjs and commit" && exit 1)

  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev libsecret-1-dev pkg-config
      - run: npm ci
      - run: npm run build:sidecars
      - run: npm run stage:bundle
      - run: npm run test:sidecar-bundle
      - run: npm run build -w @aura-os/desktop
      - run: npm run build:cloud
      - run: npm run build:bridge
      - run: npm run test:rust
      - run: npm run test:sidecars
      - run: npm run test:acceptance

  tauri-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev libsecret-1-dev pkg-config
      - run: npm ci
      - run: npm run build:sidecars
      - run: npm run stage:bundle
      - run: npm run test:sidecar-bundle
      - name: Build Tauri installer
        run: npm run tauri build -w @aura-os/desktop
        env:
          CI: true

  coverage:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build:sidecars
      - name: Run tests with coverage
        run: npx vitest run --coverage --config vitest.sidecars.config.ts
      - name: Check coverage thresholds
        run: |
          node -e "
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json','utf8'));
          const total = report.total;
          const thresholds = { lines: 60, functions: 60, branches: 50, statements: 60 };
          let failed = false;
          for (const [key, min] of Object.entries(thresholds)) {
            const pct = total[key].pct;
            if (pct < min) { console.error('❌ ' + key + ' coverage ' + pct + '% < ' + min + '%'); failed = true; }
            else { console.log('✅ ' + key + ' coverage ' + pct + '% >= ' + min + '%'); }
          }
          if (failed) process.exit(1);
          "
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false
