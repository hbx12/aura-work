name: aura-bot PR Review

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

# Separate concurrency group — does not interfere with CI/deploy
concurrency:
  group: aura-bot-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Do NOT checkout PR head — only main
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: |
            scripts/aura-bot
            README.md
            README.ar.md
            CONTRIBUTING.md
            SECURITY.md
            LICENSE
            NOTICE
            ROADMAP.md
            CHANGELOG.md
            docs
            registry

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run PR review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          AURA_BOT_NAME: ${{ vars.AURA_BOT_NAME || 'aura-bot' }}
          AURA_BOT_OWNER: ${{ vars.AURA_BOT_OWNER || 'hbx12' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/aura-bot/pr-review.mjs

      - name: Log completion
        run: echo "aura-bot PR review completed for PR ${{ github.event.pull_request.number }}"
