name: Mirror to GitLab

on:
  push:
    branches:
      - "*"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mirror-to-gitlab
  cancel-in-progress: false

jobs:
  mirror:
    if: github.repository == 'hbx12/aura-work'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all branches
        run: |
          git fetch --all --tags
          # Create local branches from all remote branches
          for branch in $(git branch -r | grep -v HEAD | grep -v '\->'); do
            local_name="${branch#origin/}"
            git branch -f "$local_name" "$branch" 2>/dev/null || true
          done

      - name: Mirror all to GitLab
        env:
          GITLAB_MIRROR_TOKEN: ${{ secrets.GITLAB_MIRROR_TOKEN }}
          GITLAB_REPOSITORY: gitlab.com/hbybbdr558/aura-work.git
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GITLAB_MIRROR_TOKEN}" ]; then
            echo "GITLAB_MIRROR_TOKEN is required."
            exit 1
          fi

          git config user.name "aura-work mirror"
          git config user.email "mirror@aura-work.local"

          # Mirror: push all refs including all branches + tags
          git push --prune "https://oauth2:${GITLAB_MIRROR_TOKEN}@${GITLAB_REPOSITORY}" \
            "+refs/remotes/origin/*:refs/heads/*" \
            "+refs/tags/*:refs/tags/*" 2>&1 || echo "⚠️ Some refs were rejected"
