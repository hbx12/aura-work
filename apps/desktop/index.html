<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/aura-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura OS</title>
    <script>
      const params = new URLSearchParams(window.location.search);
      if (params.get('view') === 'pet') {
        document.documentElement.classList.add('pet-window-mode');
      }
    </script>
    <style>
      html.pet-window-mode,
      html.pet-window-mode body,
      html.pet-window-mode #root,
      html.pet-window-mode #boot-loader {
        background: transparent !important;
        background-color: transparent !important;
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=Outfit:wght@400;500;700&family=Cairo:wght@400;500;700&family=Tajawal:wght@400;500;700&family=Almarai:wght@400;700&family=Fira+Code:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="boot-loader" style="display:grid;place-items:center;height:100vh;font-family:system-ui,sans-serif;color:#6b6560;background:#faf9f5">
      <p>Loading Aura OS…</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
